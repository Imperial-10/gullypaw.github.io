<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed a Dog - GullyPaw</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="gullypawlogo.png">

</head>
<body>
  <header style="display: flex; flex-direction: column; align-items: center;">
    <img src="gullypawlogo.png" alt="GullyPaw Logo" style="height: 60px; margin-bottom: 0.5rem;">
    <div class="logo">GullyPaw</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="impact.html">Impact</a>
      <a href="adopt.html">Adopt</a>
      <a href="feed.html">Feed</a>
      <a href="report.html">Report</a>
      <a href="login.html">Login</a>
      <button id="dark-toggle">🌓 Toggle Dark Mode</button>
    </nav>
  </header>
  <main style="max-width: 800px; margin: 3rem auto; padding: 2rem;">
    <h2>Feed a Stray</h2>
    <p>Select a location or partner shelter to sponsor a meal for a dog in need.</p>
    <form>
      <label for="city">Choose City:</label>
      <select id="city">
        <option>Bengaluru</option>
        <option>Mumbai</option>
        <option>Delhi</option>
        <option>Chennai</option>
      </select>
      <br><br>
      <label>Number of Meals:</label>
      <input type="number" min="1" max="10" value="1">
      <br><br>
      <button type="submit">Sponsor Now</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2025 GullyPaw. Every tag makes a difference.</p>
  </footer>
  <script src="script.js"></script>
 
</body>
</html>
