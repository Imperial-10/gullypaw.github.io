<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report a Dog - GullyPaw</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="gullypawlogo.png">

</head>
<body>
  <header style="display: flex; flex-direction: column; align-items: center;">
    <img src="gullypawlogo.png" alt="GullyPaw Logo" style="height: 60px; margin-bottom: 0.5rem;">
    <div class="logo">GullyPaw</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="impact.html">Impact</a>
      <a href="adopt.html">Adopt</a>
      <a href="feed.html">Feed</a>
      <a href="report.html">Report</a>
      <a href="login.html">Login</a>
      <button id="dark-toggle">🌓 Toggle Dark Mode</button>
    </nav>
  </header>

  <div class="report-container">
    <div style="text-align:center; margin-bottom: 1rem;">
      <a href="index.html" style="background-color: var(--primary-color); color: white; padding: 0.6rem 1.2rem; border-radius: 5px; text-decoration: none; font-weight: bold;">← Back to Home</a>
    </div>
    <h2>Report a Dog in Need</h2>
    <form onsubmit="handleSubmit(event)">
      <label for="dogImage">Upload Dog Image:</label>
      <input type="file" accept="image/*" capture="environment" id="dogImage" required />

      <label for="description">Description / Observations:</label>
      <textarea id="description" placeholder="e.g., limping, bleeding, looks aggressive..." required></textarea>

      <label for="location">Auto-Fetching Location:</label>
      <textarea id="location" placeholder="Fetching GPS..." readonly></textarea>

      <input type="submit" value="Submit Report" />
    </form>
    <div id="confirmation" style="display:none; padding: 1rem; margin-top: 1rem; background: #e8ffe8; border: 1px solid #2ecc71; border-radius: 5px; color: #2c662d;">
      ✅ Report submitted! Our team will review and alert local NGOs.
    </div>
  </div>

  <footer>
    <p>&copy; 2025 GullyPaw. Every tag makes a difference.</p>
  </footer>

  <script>
    // Auto fetch location
    window.onload = () => {
      const locField = document.getElementById('location');
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((position) => {
          locField.value = `Lat: ${position.coords.latitude}, Long: ${position.coords.longitude}`;
        }, () => {
          locField.value = 'Location access denied';
        });
      } else {
        locField.value = 'Geolocation not supported';
      }
    };
  function handleSubmit(event) {
      event.preventDefault();
      document.getElementById('confirmation').style.display = 'block';
      // Placeholder: Send image, description, and location to backend/API
    }
  </script>
  <script src="script.js"></script>
  <form id="reportForm">...</form>
  <input id="location" ... />
 
</body>
</html>
